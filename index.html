<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Programación Discursantes</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/authorized.css">
    <link rel="stylesheet" href="css/events.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/reports.css">
    <link rel="stylesheet" href="css/data.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons for convenience via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="dark-mode">
    <div id="app">
        <!-- Error reporting for module load issues -->
        <div id="load-error" class="hidden"
            style="padding: 20px; background: #ef4444; color: white; border-radius: 10px; margin: 20px; font-size: 0.9rem;">
            <h3>⚠️ Error de Carga / Botones no funcionan</h3>
            <p>Parece que la aplicación tiene problemas para cargar o hay datos corruptos.</p>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0;">
                <button onclick="window.cleanCache()"
                    style="background: white; color: #6366f1; border:none; padding:10px; border-radius:5px; font-weight: bold; cursor:pointer">
                    LIMPIAR CACHÉ (SEGURO)
                </button>
                <button onclick="window.hardReset()"
                    style="background: #991b1b; color: white; border:none; padding:10px; border-radius:5px; font-weight: bold; cursor:pointer">
                    Vaciado Total (Restablecer Fábrica)
                </button>
            </div>
            <p style="font-size: 0.8rem">"Limpiar Caché" mantiene tus datos. "Vaciado Total" borra todo permanentemente.
            </p>
        </div>

        <!-- Dashboard Header -->
        <header class="app-header">
            <nav class="main-nav">
                <button class="nav-btn active" id="nav-dashboard" onclick="router.navigate('dashboard')">
                    <i data-lucide="layout-dashboard"></i>
                    <span>PANEL</span>
                </button>
                <button class="nav-btn" id="nav-authorized" onclick="router.navigate('authorized')">
                    <i data-lucide="users"></i>
                    <span>AUTORIZADOS</span>
                </button>
                <button class="nav-btn" id="nav-outgoing" onclick="router.navigate('outgoing')">
                    <i data-lucide="trending-up"></i>
                    <span>VAN</span>
                </button>
                <button class="nav-btn" id="nav-incoming" onclick="router.navigate('incoming')">
                    <i data-lucide="trending-down"></i>
                    <span>VIENEN</span>
                </button>
                <button class="nav-btn" id="nav-month" onclick="router.navigate('month')">
                    <i data-lucide="calendar"></i>
                    <span>MES</span>
                </button>
                <button class="nav-btn" id="nav-masters" onclick="router.navigate('masters')">
                    <i data-lucide="map-pin"></i>
                    <span>CONGS.</span>
                </button>
                <button class="nav-btn" id="nav-reports" onclick="router.navigate('reports')">
                    <i data-lucide="file-text"></i>
                    <span>INFORMES</span>
                </button>
                <button class="nav-btn" id="nav-settings" onclick="router.navigate('settings')">
                    <i data-lucide="database"></i>
                    <span>AJUSTES</span>
                </button>
            </nav>
        </header>
        </header>

        <main id="main-content">
            <!-- Content will be injected here -->
            <div class="loader">Cargando...</div>
        </main>

        <!-- Global Modals / Notifications -->
        <div id="modal-container" class="modal-overlay hidden"></div>
        <div id="smart-scan-container" class="modal-overlay hidden"></div>
        <div id="toast-container"></div>
        <div id="undo-notification" class="hidden"></div>
    </div>

    <!-- App Scripts -->
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script type="module" src="js/app.js?v=39"></script>
    <script>
        // Initialize Lucide icons after page load
        window.addEventListener('load', () => {
            lucide.createIcons();

            // Register Service Worker for Offline capability
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('Service Worker Registered'))
                    .catch(err => console.log('SW Registration Failed', err));
            }
        });
    </script>
</body>

</html>
